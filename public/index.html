<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#CC6CE7">
<title>Park King OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23CC6CE7'/><text x='16' y='23' font-size='20' font-weight='bold' text-anchor='middle' fill='%23fff'>P</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#f7f7f8;--surface:#fff;--surface2:#f0f0f2;--border:#e4e4e7;--text:#18181b;--text2:#71717a;--text3:#a1a1aa;--accent:#CC6CE7;--accent-light:rgba(204,108,231,0.08);--green:#22c55e;--green-bg:rgba(34,197,94,0.12);--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--r:12px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
  html,body{height:100%}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
  .login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#f8f0fc 0%,#f7f7f8 50%,#f0e8fc 100%)}
  .login-box{width:100%;max-width:380px;background:var(--surface);border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px rgba(204,108,231,0.1)}
  .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center}
  .login-logo-icon{width:48px;height:48px;background:var(--accent);border-radius:14px;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace}
  .login-logo h1{font-size:20px;font-weight:700} .login-logo h1 span{color:var(--text3);display:block;font-size:12px;font-weight:500}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .form-input{width:100%;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
  .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
  .form-input::placeholder{color:var(--text3)}
  .form-group{margin-bottom:16px}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:transform .12s,opacity .12s}
  .btn:active{transform:scale(.97);opacity:.9}
  .btn-accent{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(204,108,231,0.3)}
  .btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
  .btn-white{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
  .btn-ghost{background:transparent;color:var(--text2);font-weight:500;font-size:14px;border:none}
  .btn-sm{padding:10px 16px;font-size:13px;width:auto;display:inline-block}
  .error-msg{color:var(--red);font-size:13px;margin-top:8px;text-align:center}
  .app{display:none;min-height:100dvh;flex-direction:column}.app.active{display:flex}
  .header{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:100;box-shadow:var(--shadow)}
  .header-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:15px;color:#fff;font-weight:800;font-family:'JetBrains Mono',monospace}
  .header h1{font-size:15px;font-weight:700} .header h1 span{color:var(--text3);font-size:10px;display:block;font-weight:500}
  .header-right{margin-left:auto;display:flex;gap:6px}
  .header-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s}
  .header-btn:active{border-color:var(--accent);color:var(--accent)}
  .main{flex:1;padding:16px 20px;max-width:600px;margin:0 auto;width:100%}
  .company-select{display:flex;gap:8px;margin-bottom:16px}
  .company-btn{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;box-shadow:var(--shadow)}
  .company-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .search-bar{position:relative;margin-bottom:16px}
  .search-bar input{width:100%;padding:12px 16px 12px 42px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:15px;outline:none;box-shadow:var(--shadow)}
  .search-bar input:focus{border-color:var(--accent)}
  .search-bar input::placeholder{color:var(--text3)}
  .search-bar .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
  .status-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .status-chip{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600}
  .chip-green{background:var(--green-bg);color:var(--green)}
  .chip-blue{background:rgba(96,165,250,0.08);color:#3b82f6}
  .chip-company{background:var(--accent-light);color:var(--accent)}
  .booking-list{display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
  .bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
  .bcard-row{display:flex;cursor:pointer}.bcard-row:active{background:var(--surface2)}
  .bcard-stripe{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#fff;font-family:'JetBrains Mono',monospace}.bcard-stripe.in{background:var(--green)}.bcard-stripe.out{background:var(--red)}
  .bcard-stripe .st{font-size:15px;font-weight:800}.bcard-stripe .sf{font-size:9px;font-weight:500;opacity:.85}
  .bcard-printed{font-size:10px;font-weight:600;color:var(--green);background:var(--green-bg);padding:2px 6px;border-radius:4px;margin-left:6px}
  .bcard-body{flex:1;padding:12px 14px;min-width:0}
  .bcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .bcard-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1.5px solid}
  .bcard-badge.pk{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}
  .bcard-plate{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--text);margin:4px 0 2px}
  .bcard-name{font-size:13px;color:var(--text2);font-weight:500}
  .bcard-meta{display:flex;gap:12px;font-size:12px;color:var(--text3);margin-top:4px;flex-wrap:wrap}
  .bcard-meta strong{color:var(--text2)}
  .bcard-editor{display:none;padding:14px;border-top:1px solid var(--border);background:var(--surface2)}
  .bcard-editor.open{display:block}
  .ed-row{display:flex;gap:8px;margin-bottom:8px}.ed-row .ed-col{flex:1}
  .ed-label{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
  .ed-input{width:100%;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);outline:none;font-family:'Outfit',sans-serif}
  .ed-input:focus{border-color:var(--accent)}
  .ed-input.plate{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;text-align:center;text-transform:uppercase;letter-spacing:1px}
  .label-preview{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:center;margin:10px 0}
  .label-preview canvas{display:block}
  .ed-btns{display:flex;gap:8px;flex-wrap:wrap}
  .loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--text2);font-size:14px}
  .empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1.5px solid var(--accent);color:var(--accent);padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:1000;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(204,108,231,0.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .bcard{animation:fadeUp .3s ease forwards;opacity:0}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><div class="login-logo-icon">P</div><h1>Park King OS<span>v1</span></h1></div>
    <div class="form-group"><label class="form-label">Benutzername</label><input type="text" id="loginUser" class="form-input" placeholder="Benutzername" autocomplete="username" autofocus></div>
    <div class="form-group"><label class="form-label">Passwort</label><input type="password" id="loginPass" class="form-input" placeholder="Passwort" autocomplete="current-password"></div>
    <button class="btn btn-accent" onclick="doLogin()">EINLOGGEN</button>
    <div id="loginError" class="error-msg" style="display:none"></div>
  </div>
</div>
<div class="app" id="app">
  <div class="header">
    <div class="header-icon">P</div><h1>Park King OS<span>v1</span></h1>
    <div class="header-right"><button class="header-btn" onclick="loadBookings(true)">↻ Neu laden</button><button class="header-btn" onclick="doLogout()">Logout</button></div>
  </div>
  <div class="main">
    <div class="company-select">
      <button class="company-btn active" id="btn-parkking" onclick="selectCompany('parkking')">🅿️ Park King</button>
      <button class="company-btn" id="btn-psfmsf" onclick="selectCompany('psfmsf')">✈️ PSF/MSF</button>
    </div>
    <div class="search-bar"><span class="si">🔍</span><input type="text" id="searchInput" placeholder="Kennzeichen oder Name suchen..." oninput="filterBookings()"></div>
    <div class="status-bar" id="statusBar"></div>
    <div id="loadingState" class="loading" style="display:none"><div class="spinner"></div><div class="loading-text">Buchungen werden geladen...</div></div>
    <div id="errorState" class="empty" style="display:none"></div>
    <div id="bookingList" class="booking-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let authToken=localStorage.getItem('pp_token')||'',currentCompany=localStorage.getItem('pp_company')||'parkking',allBookings=[],openEditorIdx=-1;
if(authToken){showApp();selectCompany(currentCompany);}else{document.getElementById('loginScreen').style.display='flex';}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
function ah(){return{'Authorization':'Bearer '+authToken,'Content-Type':'application/json'};}
async function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p)return;try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(d.token){authToken=d.token;localStorage.setItem('pp_token',authToken);showApp();selectCompany(currentCompany);}else showErr(d.error||'Ungültige Zugangsdaten');}catch(e){showErr('Verbindungsfehler');}}
function doLogout(){authToken='';localStorage.removeItem('pp_token');document.getElementById('app').classList.remove('active');document.getElementById('loginScreen').style.display='flex';}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('active');}
function showErr(m){const e=document.getElementById('loginError');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
function selectCompany(id){currentCompany=id;localStorage.setItem('pp_company',id);document.querySelectorAll('.company-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+id).classList.add('active');loadBookings(false);}
async function loadBookings(refresh){const list=document.getElementById('bookingList'),ld=document.getElementById('loadingState'),er=document.getElementById('errorState');list.innerHTML='';ld.style.display='flex';er.style.display='none';document.getElementById('searchInput').value='';document.getElementById('statusBar').innerHTML='';openEditorIdx=-1;if(refresh){try{await fetch('/api/scrape',{method:'POST',headers:ah(),body:JSON.stringify({company:currentCompany})});}catch(e){}}try{const today=new Date().toISOString().split('T')[0];const r=await fetch('/api/bookings?company='+currentCompany+'&date='+today,{headers:ah()});if(r.status===401){doLogout();return;}const d=await r.json();if(d.error)throw new Error(d.error);allBookings=d.bookings||[];ld.style.display='none';const cn=currentCompany==='parkking'?'Park King':'PSF/MSF';const ins=allBookings.filter(b=>b.type==='in').length,outs=allBookings.filter(b=>b.type==='out').length;document.getElementById('statusBar').innerHTML=`<div class="status-chip chip-company">${cn}</div><div class="status-chip chip-blue">${d.date||today}</div><div class="status-chip chip-green">▶ ${ins} Annahmen</div>${outs?`<div class="status-chip" style="background:var(--red-bg);color:var(--red)">◀ ${outs} Rückgaben</div>`:''}`;if(!allBookings.length){er.textContent='Keine Buchungen für heute.';er.style.display='block';return;}renderBookings(allBookings);showToast(allBookings.length+' Buchungen geladen ✓');}catch(e){ld.style.display='none';er.innerHTML=`<div style="margin-bottom:8px">⚠️ ${e.message}</div><button class="btn btn-accent btn-sm" onclick="loadBookings(true)">Nochmal</button>`;er.style.display='block';}}
function filterBookings(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const f=q?allBookings.filter(b=>(b.plate||'').toLowerCase().includes(q)||(b.name||'').toLowerCase().includes(q)):allBookings;renderBookings(f);}
let printedIds=JSON.parse(localStorage.getItem('pp_printed')||'{}');
function markPrinted(idx){const b=allBookings[idx];if(b&&b.id){printedIds[b.id]=true;localStorage.setItem('pp_printed',JSON.stringify(printedIds));}}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function renderBookings(list){const el=document.getElementById('bookingList');if(!list.length){el.innerHTML='<div class="empty">Keine Treffer.</div>';return;}const cn=currentCompany==='parkking'?'Park King':'PSF/MSF';el.innerHTML=list.map((b,i)=>{const idx=allBookings.indexOf(b);const isIn=b.type==='in';const ret=(b.date_out||'')+(b.time_out?' '+b.time_out:'');const time=b.time_in||b.time_out||'';const flight=b.flight_code&&b.flight_code!=='TO BE UPDATED'?b.flight_code:'';const printed=printedIds[b.id];return`<div class="bcard" style="animation-delay:${Math.min(i,15)*0.03+0.05}s" id="bcard-${idx}"><div class="bcard-row" onclick="toggleEditor(${idx})"><div class="bcard-stripe ${isIn?'in':'out'}">${flight?`<div class="sf">✈${esc(flight)}</div>`:''}<div class="st">${esc(time)||'—'}</div></div><div class="bcard-body"><div class="bcard-top"><span class="bcard-badge pk">${cn}</span><span>${printed?'<span class="bcard-printed">🖨 gedruckt</span>':''}${b.status==='checked'?'<span style="color:var(--green);font-size:16px;margin-left:4px">✓</span>':''}</span></div><div class="bcard-plate">${esc(b.plate)||'—'} ${b.external_id?'<span style="color:var(--text3);font-size:12px;font-weight:400">#'+esc(b.external_id)+'</span>':''}</div><div class="bcard-name">${esc(b.name)||'—'}</div><div class="bcard-meta">${ret?`<span>↩ <strong>${esc(ret)}</strong></span>`:''}${b.car?`<span>🚗 ${esc(b.car)}</span>`:''}${b.pax?`<span>👤 ${b.pax}</span>`:''}</div></div></div><div class="bcard-editor" id="editor-${idx}"><div class="ed-row"><div class="ed-col"><div class="ed-label">Kundenname</div><input class="ed-input" id="en-${idx}" value="${esc(b.name)}" oninput="rl(${idx})"></div></div><div class="ed-row"><div class="ed-col"><div class="ed-label">Rückgabe Datum</div><input class="ed-input" id="ed-${idx}" value="${esc(b.date_out)}" oninput="rl(${idx})"></div><div class="ed-col"><div class="ed-label">Uhrzeit</div><input class="ed-input" id="et-${idx}" value="${esc(b.time_out)}" oninput="rl(${idx})"></div></div><div class="ed-row"><div class="ed-col"><div class="ed-label">Fahrzeug</div><input class="ed-input" id="ec-${idx}" value="${esc(b.car)}" oninput="rl(${idx})"></div><div class="ed-col"><div class="ed-label">Kennzeichen</div><input class="ed-input plate" id="ep-${idx}" value="${esc(b.plate)}" oninput="this.value=this.value.toUpperCase();rl(${idx})"></div></div><div class="label-preview"><canvas id="cv-${idx}"></canvas></div><div class="ed-btns"><button class="btn btn-accent btn-sm" onclick="printL(${idx})">🖨 Drucken</button><button class="btn btn-white btn-sm" onclick="downloadL(${idx})">📲 Speichern</button><button class="btn btn-outline btn-sm" onclick="shareL(${idx})">↗ Teilen</button><button class="btn btn-ghost btn-sm" onclick="saveClose(${idx})">✓ Fertig</button></div></div></div>`;}).join('');if(openEditorIdx>=0){const ed=document.getElementById('editor-'+openEditorIdx);if(ed){ed.classList.add('open');rl(openEditorIdx);}}}
function toggleEditor(idx){if(openEditorIdx===idx){saveClose(idx);return;}if(openEditorIdx>=0){const p=document.getElementById('editor-'+openEditorIdx);if(p)p.classList.remove('open');}openEditorIdx=idx;const ed=document.getElementById('editor-'+idx);if(ed){ed.classList.add('open');rl(idx);}}
async function saveClose(idx){const b=allBookings[idx];if(b&&b.id){const u={name:document.getElementById('en-'+idx).value.trim(),plate:document.getElementById('ep-'+idx).value.trim().toUpperCase(),car:document.getElementById('ec-'+idx).value.trim(),date_out:document.getElementById('ed-'+idx).value.trim(),time_out:document.getElementById('et-'+idx).value.trim()};try{await fetch('/api/bookings/'+b.id,{method:'PUT',headers:ah(),body:JSON.stringify(u)});Object.assign(allBookings[idx],u);}catch(e){}}openEditorIdx=-1;const ed=document.getElementById('editor-'+idx);if(ed)ed.classList.remove('open');filterBookings();}
function rl(idx){const name=(document.getElementById('en-'+idx)?.value||'').trim(),retDate=(document.getElementById('ed-'+idx)?.value||'').trim(),retTime=(document.getElementById('et-'+idx)?.value||'').trim(),car=(document.getElementById('ec-'+idx)?.value||'').trim(),plate=(document.getElementById('ep-'+idx)?.value||'').trim().toUpperCase(),cn=currentCompany==='parkking'?'Park King':'PSF/MSF';const W=673,H=378,cv=document.getElementById('cv-'+idx);if(!cv)return;cv.width=W;cv.height=H;cv.style.width='100%';cv.style.maxWidth='300px';cv.style.height='auto';const c=cv.getContext('2d');c.fillStyle='#fff';c.fillRect(0,0,W,H);c.fillStyle='#000';c.textAlign='center';c.textBaseline='top';let y=2;let f1=22;c.font=`600 ${f1}px "Helvetica Neue",Arial,sans-serif`;while(c.measureText(name||'—').width>W-10&&f1>12){f1-=2;c.font=`600 ${f1}px "Helvetica Neue",Arial,sans-serif`;}c.fillText(name||'—',W/2,y);y+=f1+1;let fp=38;c.font=`900 ${fp}px "JetBrains Mono",monospace`;while(c.measureText(plate||'—').width>W-10&&fp>20){fp-=2;c.font=`900 ${fp}px "JetBrains Mono",monospace`;}c.fillText(plate||'—',W/2,y);y+=fp+2;let f2=100;c.font=`900 ${f2}px "Helvetica Neue",Arial,sans-serif`;while(c.measureText(retDate||'—').width>W-8&&f2>50){f2-=4;c.font=`900 ${f2}px "Helvetica Neue",Arial,sans-serif`;}c.fillText(retDate||'—',W/2,y);y+=f2-4;let f3=82;c.font=`900 ${f3}px "Helvetica Neue",Arial,sans-serif`;while(c.measureText(retTime||'—').width>W-8&&f3>40){f3-=4;c.font=`900 ${f3}px "Helvetica Neue",Arial,sans-serif`;}c.fillText(retTime||'—',W/2,y);c.textBaseline='bottom';c.fillStyle='#333';let f4=22;c.font=`700 ${f4}px "Helvetica Neue",Arial,sans-serif`;const botLine=cn+(car?' · '+car:'');c.fillText(botLine,W/2,H-2);c.textAlign='left';}
function gc(i){return document.getElementById('cv-'+i);}
function printL(i){const cv=gc(i);if(!cv)return;markPrinted(i);filterBookings();const d=cv.toDataURL('image/png');const w=window.open('','_blank','width=600,height=400');w.document.write(`<!DOCTYPE html><html><head><title>Label</title><style>@page{size:57mm 32mm;margin:0}*{margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;width:57mm;height:32mm}img{width:57mm;height:32mm;object-fit:contain}@media screen{body{background:#f0f0f0;padding:20px;width:auto;height:auto}img{border:1px solid #ccc}}</style></head><body><img src="${d}" onload="setTimeout(()=>{window.print();},300);"></body></html>`);w.document.close();showToast('Label gedruckt ✓');}
function downloadL(i){const cv=gc(i);if(!cv)return;const p=(document.getElementById('ep-'+i)?.value||'label').trim().toUpperCase().replace(/[\s\.]/g,'-');const a=document.createElement('a');a.download=`label-${p}-${Date.now()}.png`;a.href=cv.toDataURL('image/png');a.click();showToast('Gespeichert ✓');}
async function shareL(i){const cv=gc(i);if(!cv)return;try{const b=await new Promise(r=>cv.toBlob(r,'image/png'));const f=new File([b],'label.png',{type:'image/png'});if(navigator.canShare?.({files:[f]})){await navigator.share({files:[f],title:'Label'});}else{downloadL(i);}}catch(e){downloadL(i);}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
</script>
